name: Build & Deploy to AWS

# Auto-build and push the LensAssist Docker image to ECR on every push to main.
# App Runner is configured with deployment trigger = Automatic, so a new
# :latest image triggers a redeploy within ~1 minute.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID       — IAM user with ECR push + AppRunner deploy
#   AWS_SECRET_ACCESS_KEY   — matching secret
#   AWS_ACCOUNT_ID          — 964059510816
#   AWS_REGION              — us-east-1
#   APPRUNNER_SERVICE_ARN   — arn:aws:apprunner:us-east-1:964059510816:service/lensassist/<id>

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual re-run from GitHub UI

env:
  ECR_REPO: lensassist
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPO:latest .
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest
          echo "Pushed ${ECR_REGISTRY}/${ECR_REPO}:latest"

      - name: Trigger App Runner deployment
        env:
          APPRUNNER_SERVICE_ARN: ${{ secrets.APPRUNNER_SERVICE_ARN }}
        run: |
          if [ -z "$APPRUNNER_SERVICE_ARN" ]; then
            echo "APPRUNNER_SERVICE_ARN secret not set — skipping (App Runner will pull :latest on its own auto-deploy schedule)"
            exit 0
          fi
          aws apprunner start-deployment \
            --service-arn "$APPRUNNER_SERVICE_ARN" \
            --region "${{ secrets.AWS_REGION }}"
          echo "✅ App Runner redeploy triggered"
